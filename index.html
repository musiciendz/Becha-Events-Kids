<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Becha Events PRO - Smart Controls</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary-red: #E10600; --white: #ffffff; --light-bg: #f4f7f6; --sidebar-width: 250px; }
        body { font-family: 'Cairo', sans-serif; background: var(--light-bg); margin: 0; direction: rtl; overflow-x: hidden; }
        .app-container { display: flex; min-height: 100vh; }
        aside { width: var(--sidebar-width); background: var(--white); border-left: 1px solid #ddd; position: fixed; height: 100vh; right: 0; top: 0; display: flex; flex-direction: column; z-index: 1000; box-shadow: -2px 0 10px rgba(0,0,0,0.05); }
        main { flex-grow: 1; margin-right: var(--sidebar-width); padding: 30px; box-sizing: border-box; }
        @media (max-width: 900px) {
            aside { width: 100%; height: auto; position: fixed; bottom: 0; top: auto; flex-direction: row; border-top: 2px solid var(--primary-red); }
            main { margin-right: 0; padding: 15px 15px 100px 15px; }
            .sidebar-header { display: none; }
        }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 5px solid var(--primary-red); }
        .red-btn { background: var(--primary-red); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Cairo'; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Cairo'; font-size: 15px; }
        .event-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .status-future { color: #888; font-style: italic; font-size: 13px; }
        #imageModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #hiddenExportArea { position: absolute; left: -9999px; top: 0; width: 500px; padding: 40px; background: white; border-top: 20px solid var(--primary-red); text-align: center; }
    </style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; inset:0; background:white; z-index:20000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="color:var(--primary-red); font-weight:900; font-size:40px; margin:0;">BECHA EVENTS</h1>
    <p style="color:#666; margin-bottom:30px;">نظام الإدارة المطور</p>
    <input type="password" id="loginPass" placeholder="كلمة السر" style="max-width:320px; text-align:center;">
    <button class="red-btn" style="max-width:320px;" onclick="login()">دخول</button>
</div>

<div class="app-container" id="mainApp" style="display:none;">
    <aside>
        <div class="sidebar-header" style="padding:30px 15px; text-align:center; border-bottom:1px solid #eee;">
            <div style="color:var(--primary-red); font-weight:900; font-size:22px;">BECHA EVENTS</div>
        </div>
        <nav style="flex-grow:1; padding:15px; display:flex; flex-direction:column; gap:10px;">
            <button class="red-btn" onclick="showSection('home')">🏠 الرئيسية</button>
            <button class="red-btn" style="background:#333;" onclick="showSection('events')">🎭 الحفلات</button>
            <button class="red-btn" style="background:#555;" onclick="showSection('accountSection')">📊 كشف حساب</button>
            <button class="red-btn" style="background:#000; margin-top:auto;" onclick="logout()">🚪 خروج</button>
        </nav>
        <div style="padding:15px; text-align:center; font-size:12px; color:#888;" id="liveClock">🕒 00:00</div>
    </aside>

    <main>
        <div id="home" class="content-section">
            <div class="card" style="text-align:center;">
                <h3 style="margin:0; color:#888;">السيولة المتوفرة (كاش) 💰</h3>
                <h1 id="totalBalance" style="color:var(--primary-red); font-size:50px; margin:15px 0;">0 د.ت</h1>
            </div>
            <div class="card">
                <h2>📅 برنامج اليوم</h2>
                <div id="todayEventsList"></div>
            </div>
        </div>

        <div id="events" class="content-section" style="display:none;">
            <div class="card">
                <h2>➕ إضافة حجز جديد</h2>
                <input type="text" id="name" placeholder="اسم المؤسسة">
                <input type="date" id="date">
                <input type="number" id="price" placeholder="الثمن">
                <button class="red-btn" onclick="addEvent()">حفظ في السحابة</button>
            </div>
            <div class="card">
                <h2>📋 سجل الحفلات (تاريخياً)</h2>
                <div id="allEventsList"></div>
            </div>
        </div>

        <div id="accountSection" class="content-section" style="display:none;">
            <div class="card">
                <h2>📸 تصدير كشف حساب</h2>
                <select id="empSelect"></select>
                <button class="red-btn" style="background:#198754;" onclick="generateAccountImage()">توليد صورة الكشف</button>
            </div>
        </div>
    </main>
</div>

<div id="hiddenExportArea">
    <h1 style="color:var(--primary-red);">BECHA EVENTS</h1>
    <div style="font-size:20px; margin-top:30px; text-align:right;">
        <b>الموظف:</b> <span id="expName"></span><br>
        <b>تاريخ الكشف:</b> <span id="expDate"></span><br>
        <b>المجموع:</b> <span id="expPrice"></span> د.ت
    </div>
</div>

<div id="imageModal">
    <img id="resultImage" style="max-width:100%; border-radius:10px; border:4px solid white;">
    <button class="red-btn" style="width:200px; margin-top:20px;" onclick="document.getElementById('imageModal').style.display='none'">إغلاق</button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCTTjp34QhF6MPNemwKhoq7385xnJKK_Hg",
    authDomain: "becha-events-kids.firebaseapp.com",
    databaseURL: "https://becha-events-kids-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "becha-events-kids",
    storageBucket: "becha-events-kids.firebasestorage.app",
    messagingSenderId: "763935242130",
    appId: "1:763935242130:web:490a99e38c53ba0240f34b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let events = [], team = [];

function login() {
    if(document.getElementById('loginPass').value === "amouhfy2025") {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        startSync();
    } else { alert("غلط!"); }
}

function startSync() {
    db.ref('BechaEventsData').on('value', snap => {
        const d = snap.val();
        if(d) {
            events = d.events || [];
            team = d.team || [];
            updateUI();
        }
    });
}

function updateUI() {
    let paidTotal = events.filter(e => e.collected === true).reduce((s, e) => s + (parseFloat(e.price) || 0), 0);
    document.getElementById('totalBalance').innerText = paidTotal + " د.ت";
    document.getElementById('empSelect').innerHTML = team.map((t, i) => `<option value="${i}">${t.name}</option>`).join('');

    let todayStr = new Date().toISOString().slice(0, 10);

    document.getElementById('allEventsList').innerHTML = events.map((e, i) => {
        let isFuture = e.date > todayStr;
        return `
        <div class="event-item">
            <div><b>${e.name}</b><br><small>${e.date}</small></div>
            <div>
                ${e.collected ? '<span style="color:green">✅ خلصت</span>' : 
                  (isFuture ? '<span class="status-future">📅 لم يحن وقتها</span>' : 
                  `<button class="red-btn" style="width:auto; padding:5px 10px;" onclick="collectMoney(${i})">قبض ${e.price}د</button>`)}
                <button onclick="deleteEvent(${i})" style="border:none; background:none; color:red; margin-right:10px; cursor:pointer;">🗑</button>
            </div>
        </div>
    `}).reverse().join('');
}

function addEvent() {
    let name = document.getElementById('name').value, date = document.getElementById('date').value, price = document.getElementById('price').value;
    if(!name || !date || !price) return;
    events.push({ name, date, price, collected: false });
    db.ref('BechaEventsData').update({ events: events });
}

function collectMoney(i) {
    events[i].collected = true;
    db.ref('BechaEventsData').update({ events: events });
}

function deleteEvent(i) {
    if(confirm("حذف؟")) {
        events.splice(i, 1);
        db.ref('BechaEventsData').update({ events: events });
    }
}

function generateAccountImage() {
    let member = team[document.getElementById('empSelect').value];
    document.getElementById('expName').innerText = member.name;
    document.getElementById('expDate').innerText = new Date().toLocaleDateString('ar-TN');
    document.getElementById('expPrice').innerText = member.price;
    html2canvas(document.getElementById('hiddenExportArea'), { scale: 3 }).then(canvas => {
        document.getElementById('resultImage').src = canvas.toDataURL();
        document.getElementById('imageModal').style.display = 'flex';
    });
}

function showSection(id) {
    document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function logout() { location.reload(); }
setInterval(() => { document.getElementById('liveClock').innerText = "🕒 " + new Date().toLocaleTimeString('ar-TN'); }, 1000);
</script>
</body>
</html>
